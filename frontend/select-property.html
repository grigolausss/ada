<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selezione Immobile</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/forms.css">
    <style>
        /* Stili specifici per questa pagina */
        .suggestions-wrapper {
            position: relative;
        }
        #suggestions {
            position: absolute;
            background: white;
            width: 100%;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 10;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        #suggestions li {
            padding: 10px;
            cursor: pointer;
        }
        #suggestions li:hover {
            background-color: #f0f0f0;
        }
        .privacy-consent {
            text-align: left;
            margin: 20px 0;
            font-size: 14px;
        }
        .privacy-consent label {
            color: #718096;
        }
        #property-preview {
            text-align: left;
            margin-top: 20px;
        }
        .preview-photos img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-right: 10px;
            filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Identifica l'Immobile</h1>
        <p>Digita il riferimento dell'immobile che ti interessa. Se il riferimento è già nel tuo link, lo troverai precompilato.</p>

        <div id="property-selection-step">
            <form id="property-form">
                <input type="text" id="property-ref" placeholder="Es: RM-123" required autocomplete="off">
                <div class="suggestions-wrapper" id="suggestions"></div>

                <div id="property-preview" style="display: none;">
                    <h2 id="preview-title"></h2>
                    <p id="preview-details"></p>
                    <div class="preview-photos">
                        <img src="https://via.placeholder.com/150/CCCCCC/FFFFFF?text=Foto+1" alt="Foto sfocata 1">
                        <img src="https://via.placeholder.com/150/CCCCCC/FFFFFF?text=Foto+2" alt="Foto sfocata 2">
                    </div>
                </div>

                <div class="privacy-consent">
                    <input type="checkbox" id="privacy" name="privacy" required>
                    <label for="privacy">Dichiaro di aver letto l'informativa sulla <a href="/privacy.html" target="_blank">privacy</a> e acconsento al trattamento dei dati.</label>
                </div>

                <button type="submit" id="continue-btn" disabled>Continua</button>
            </form>
        </div>
    </div>

    <script src="js/select-property.js"></script>
</body>
</html>
