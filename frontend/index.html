<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica Cliente</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/forms.css">
</head>
<body>

    <div class="container">
        <div id="phone-step">
            <h1>Accesso Riservato</h1>
            <p>Per iniziare, inserisci il tuo numero di telefono. Ti invieremo un codice di verifica via SMS.</p>
            <form id="phone-form">
                <input type="tel" id="phone" placeholder="Il tuo numero di telefono" required>
                <button type="submit">Invia Codice</button>
            </form>
            <p class="error-message" id="phone-error"></p>
        </div>

        <div id="otp-step" style="display: none;">
            <h1>Verifica il tuo numero</h1>
            <p>Abbiamo inviato un codice a 6 cifre al numero <span id="display-phone"></span>. Inseriscilo qui sotto.</p>
            <form id="otp-form">
                <input type="text" id="otp" placeholder="Codice a 6 cifre" required maxlength="6">
                <button type="submit">Verifica</button>
            </form>
            <p class="error-message" id="otp-error"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
