<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Consenso Privacy</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/forms.css">
</head>
<body>
    <div class="container" style="text-align: left; max-width: 600px;">
        <h1>Informativa Privacy</h1>
        <div style="height: 200px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 20px;">
            <p><strong>1. Titolare del Trattamento:</strong> L'Arte di Abitare S.p.A.</p>
            <p><strong>2. Finalità:</strong> I dati sono usati per verificare la tua identità e permettere l'accesso a materiale riservato.</p>
        </div>
        <div>
            <input type="checkbox" id="privacy-checkbox">
            <label for="privacy-checkbox">Dichiaro di aver letto e acconsento al trattamento dei dati.</label>
        </div>
        <br>
        <button id="continue-btn" disabled>Accetto e Continuo</button>
    </div>
    <script src="js/privacy.js"></script>
</body>
</html>
