<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualificazione</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/forms.css">
    <style>
        .question-group { text-align: left; margin-bottom: 30px; }
        .question-group label { font-weight: bold; display: block; margin-bottom: 10px; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .option-btn { padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; background-color: #fff; cursor: pointer; text-align: center; }
        .option-btn.selected { background-color: #2d3748; color: #fff; border-color: #2d374ar; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ancora un passo...</h1>
        <p>Rispondi ad almeno 4 domande veloci per sbloccare la visuale privata della planimetria.</p>
        <form id="qualify-form">
            <div class="question-group" data-question="budget">
                <label>Budget?</label>
                <div class="options-grid">
                    <div class="option-btn" data-value="<150k">&lt;150k €</div><div class="option-btn" data-value="150-250k">150-250k €</div>
                    <div class="option-btn" data-value="250-350k">250-350k €</div><div class="option-btn" data-value="350-500k">350-500k €</div>
                    <div class="option-btn" data-value=">500k">&gt;500k €</div>
                </div>
            </div>
            <div class="question-group" data-question="mutuo">
                <label>Situazione mutuo?</label>
                <div class="options-grid">
                    <div class="option-btn" data-value="deliberato">Già deliberato</div><div class="option-btn" data-value="pre-delibera">Pre-delibera</div>
                    <div class="option-btn" data-value="da richiedere">Da richiedere</div><div class="option-btn" data-value="no mutuo">No mutuo</div>
                </div>
            </div>
            <div class="question-group" data-question="anticipo">
                <label>Anticipo?</label>
                <div class="options-grid">
                    <div class="option-btn" data-value="<10%">&lt;10%</div><div class="option-btn" data-value="10-20%">10-20%</div>
                    <div class="option-btn" data-value=">20%">&gt;20%</div>
                </div>
            </div>
            <div class="question-group" data-question="tempistiche">
                <label>Tempistiche?</label>
                <div class="options-grid">
                    <div class="option-btn" data-value="subito">Subito</div><div class="option-btn" data-value="1-3 mesi">1-3 mesi</div>
                    <div class="option-btn" data-value="3-6 mesi">3-6 mesi</div><div class="option-btn" data-value=">6 mesi">&gt;6 mesi</div>
                </div>
            </div>
            <div class="question-group" data-question="necessita" data-multiple="true">
                <label>Necessità? (opzionale)</label>
                <div class="options-grid">
                    <div class="option-btn" data-value="box">Box</div><div class="option-btn" data-value="ascensore">Ascensore</div>
                    <div class="option-btn" data-value="terrazzo">Terrazzo</div><div class="option-btn" data-value="2+ bagni">2+ Bagni</div>
                </div>
            </div>
            <button type="submit" id="unlock-btn" disabled>Sblocca Planimetria</button>
        </form>
    </div>
    <script src="js/qualify.js"></script>
</body>
</html>
