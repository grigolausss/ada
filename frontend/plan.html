<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planimetria Riservata</title>
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
            border: 1px solid #ccc;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        #confirmation-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #confirmation-box {
            background-color: #fff; padding: 30px; border-radius: 8px;
            max-width: 500px; text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="confirmation-modal">
        <div id="confirmation-box">
            <h1>Visuale Privata</h1>
            <p>Stai per accedere a un'area riservata. Ogni accesso è personale e tracciato. È vietato salvare o condividere le planimetrie.</p>
            <button id="confirm-btn">Accetto e Continuo</button>
        </div>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <h1>Planimetria</h1>
        <div id="canvas-container">
            <canvas id="plan-canvas"></canvas>
        </div>
        <div class="decision-bar" style="padding: 20px; text-align: center;">
            <button id="decision-btn">Ho Visto Abbastanza &rarr;</button>
        </div>
    </div>

    <script src="js/plan.js"></script>
</body>
</html>
