<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Console ADA - Login</title>
    <link rel="stylesheet" href="../frontend/assets/styles.css">
    <link rel="stylesheet" href="../frontend/assets/forms.css">
</head>
<body>
    <div class="container">
        <div id="login-step">
            <h1>Login Staff</h1>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required value="admin@ada.it">
                <input type="password" id="password" placeholder="Password" required value="password123">
                <button type="submit">Accedi</button>
            </form>
        </div>
        <div id="otp-step" style="display: none;">
            <h1>Verifica OTP</h1>
            <p>Controlla la console del server per il codice di verifica.</p>
            <form id="otp-form">
                <input type="text" id="otp" placeholder="Codice a 6 cifre" required>
                <button type="submit">Verifica</button>
            </form>
        </div>
        <p class="error-message" id="error-message" style="display: none;"></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
